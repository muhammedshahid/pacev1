<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1570 500" font-family="Arial, sans-serif" font-size="12">
    <style>
        .block { stroke: #000; stroke-width: 1px; rx: 10px; ry: 10px; }
        .arrow { stroke: #000; stroke-width: 1px; fill: none; }
        .text { fill: #000; }
        .sub-label { font-size: 10px; font-weight: bold;}
        .preproc { fill: #d9eaf7; } /* Light Blue */
        .analysis { fill: #e2f3d9; } /* Light Green */
        .enhance { fill: #f9e3cf; } /* Light Orange */
        .stability { fill: #f5cccc; } /* Light Red */
    </style>

    <rect x="20" y="200" width="100" height="60" class="block preproc"/>
    <text x="70" y="235" text-anchor="middle" class="text">Input Image<tspan x="70" dy="15">(RGB)</tspan></text>

    <rect x="150" y="200" width="100" height="60" class="block preproc"/>
    <text x="200" y="235" text-anchor="middle" class="text">OKLab Color<tspan x="200" dy="15">Conversion</tspan></text>

    <rect x="280" y="200" width="100" height="60" class="block preproc"/>
    <text x="330" y="235" text-anchor="middle" class="text">Extract<tspan x="330" dy="15">Luminance (L)</tspan></text>

    <path d="M120,230 L150,230" class="arrow"/>
    <polygon points="150,230 145,227 145,233" fill="#000"/>
    <path d="M250,230 L280,230" class="arrow"/>
    <polygon points="280,230 275,227 275,233" fill="#000"/>

    <path d="M380,230 L400,230 L400,100 L420,100" class="arrow"/>
    <polygon points="420,100 415,97 415,103" fill="#000"/>
    <path d="M380,230 L400,230 L400,360 L420,360" class="arrow"/>
    <polygon points="420,360 415,357 415,363" fill="#000"/>

    <rect x="420" y="40" width="160" height="120" class="block analysis"/>
    <text x="500" y="60" text-anchor="middle" class="text">Global Feature<tspan x="500" dy="15">Extraction</tspan></text>
    <text x="500" y="100" text-anchor="middle" class="text sub-label">mean</text>
    <text x="500" y="115" text-anchor="middle" class="text sub-label">variance</text>
    <text x="500" y="130" text-anchor="middle" class="text sub-label">entropy</text>
    <text x="500" y="145" text-anchor="middle" class="text sub-label">dynamic range, skewness</text>

    <rect x="610" y="40" width="160" height="60" class="block analysis"/>
    <text x="690" y="70" text-anchor="middle" class="text">Adaptive Parameter<tspan x="690" dy="15">Controller</tspan></text>
    <text x="690" y="115" text-anchor="middle" class="text sub-label">outputs: α, β, τ, clipLimit, tileSize</text>

    <path d="M580,100 L610,100" class="arrow"/>
    <polygon points="610,100 605,97 605,103" fill="#000"/>

    <rect x="420" y="300" width="160" height="120" class="block analysis"/>
    <text x="500" y="320" text-anchor="middle" class="text">Perceptual Map<tspan x="500" dy="15">Generation</tspan></text>
    <text x="500" y="360" text-anchor="middle" class="text sub-label">edge map</text>
    <text x="500" y="375" text-anchor="middle" class="text sub-label">structure mask</text>
    <text x="500" y="390" text-anchor="middle" class="text sub-label">skin damp map</text>
    <text x="500" y="405" text-anchor="middle" class="text sub-label">local alpha map</text>

    <rect x="610" y="300" width="160" height="60" class="block analysis"/>
    <text x="690" y="335" text-anchor="middle" class="text">Spatial Gain<tspan x="690" dy="15">Modulation</tspan></text>

    <path d="M580,360 L610,360" class="arrow"/>
    <polygon points="610,360 605,357 605,363" fill="#000"/>

    <path d="M770,100 L790,100 L790,200 L810,200" class="arrow"/>
    <polygon points="810,200 805,197 805,203" fill="#000"/>
    <path d="M770,360 L790,360 L790,260 L810,260" class="arrow"/>
    <polygon points="810,260 805,257 805,263" fill="#000"/>

    <rect x="810" y="180" width="160" height="100" class="block enhance"/>
    <text x="890" y="200" text-anchor="middle" class="text">Multi-Signal<tspan x="890" dy="15">Enhancement Module</tspan></text>
    <text x="890" y="240" text-anchor="middle" class="text sub-label">CLAHE contrast enhancement</text>
    <text x="890" y="255" text-anchor="middle" class="text sub-label">Retinex detail component</text>
    <text x="890" y="270" text-anchor="middle" class="text sub-label">Laplacian texture enhancement</text>

    <path d="M970,230 L1000,230" class="arrow"/>
    <polygon points="1000,230 995,227 995,233" fill="#000"/>

    <rect x="1000" y="200" width="160" height="60" class="block stability"/>
    <text x="1080" y="225" text-anchor="middle" class="text">Nonlinear Stability<tspan x="1080" dy="15">Model</tspan></text>
    <text x="1080" y="255" text-anchor="middle" class="text" font-style="italic">Δ / (1 + λ |Δ|)</text>

    <rect x="1190" y="200" width="100" height="60" class="block preproc"/>
    <text x="1240" y="235" text-anchor="middle" class="text">Enhanced<tspan x="1240" dy="15">Luminance</tspan></text>

    <rect x="1320" y="200" width="100" height="60" class="block preproc"/>
    <text x="1370" y="230" text-anchor="middle" class="text">RGB Reconstruction<tspan x="1370" dy="15">(OKLab → RGB)</tspan></text>

    <rect x="1450" y="200" width="100" height="60" class="block preproc"/>
    <text x="1500" y="230" text-anchor="middle" class="text">Enhanced Image<tspan x="1500" dy="15">Output</tspan></text>

    <path d="M1160,230 L1190,230" class="arrow"/>
    <polygon points="1190,230 1185,227 1185,233" fill="#000"/>
    <path d="M1290,230 L1320,230" class="arrow"/>
    <polygon points="1320,230 1315,227 1315,233" fill="#000"/>
    <path d="M1420,230 L1450,230" class="arrow"/>
    <polygon points="1450,230 1445,227 1445,233" fill="#000"/>
</svg>